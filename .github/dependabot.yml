# Keep dependency PRs grouped and delayed for at least 48 hours so newly published packages age before adoption.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(deps)"
    cooldown:
      default-days: 2
    groups:
      github-actions-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    cooldown:
      default-days: 2
    groups:
      nuget-dependencies:
        patterns:
          - "*"
    ignore:
      # Pinned to the 2.0.0-beta4 line until the System.CommandLine 2.0 GA API
      # migration is done (InvokeAsync/SetHandler/Argument<T> ctors all changed).
      # The semver-major rule alone does NOT catch the beta4 -> 2.0.x stable jump
      # (both are major 2), so we also ignore any >= 2.0.0 stable release.
      - dependency-name: "System.CommandLine"
        update-types: ["version-update:semver-major"]
      - dependency-name: "System.CommandLine"
        versions: [">= 2.0.0"]
