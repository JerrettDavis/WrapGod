name: Publish docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'

permissions:
  actions: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  publish-docs:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect docfx config
        id: docfx
        shell: bash
        run: |
          if [ -f docs/docfx.json ]; then
            echo "has_config=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_config=false" >> "$GITHUB_OUTPUT"
            echo "docs/docfx.json not found; skipping docs publish."
          fi

      - name: Setup .NET
        if: steps.docfx.outputs.has_config == 'true'
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install docfx
        if: steps.docfx.outputs.has_config == 'true'
        run: dotnet tool update -g docfx

      - name: Build docfx metadata
        if: steps.docfx.outputs.has_config == 'true'
        run: docfx metadata docs/docfx.json

      - name: Build docfx site
        if: steps.docfx.outputs.has_config == 'true'
        run: docfx build docs/docfx.json

      - name: Upload artifact
        if: steps.docfx.outputs.has_config == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'docs/_site'

      - name: Deploy to GitHub Pages
        if: steps.docfx.outputs.has_config == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
