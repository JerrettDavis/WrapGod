name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore WrapGod.slnx

      - name: Build
        run: dotnet build WrapGod.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test WrapGod.slnx --configuration Release --no-build --verbosity normal
